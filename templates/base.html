<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ActivityLog{% endblock %} — ActivityLog</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <link rel="stylesheet" href="/static/css/style.css"/>
  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon"><i class="bi bi-activity"></i></span>
    <span class="brand-text">ActivityLog</span>
  </div>

  <nav class="sidebar-nav">
    <span class="nav-label">MONITOR</span>
    <a href="/dashboard"     class="nav-link {% if request.path == '/dashboard'     %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/logs"          class="nav-link {% if request.path == '/logs'          %}active{% endif %}">
      <i class="bi bi-table"></i> MySQL Logs
    </a>

    <span class="nav-label">ACTIONS</span>
    <a href="/generator"     class="nav-link {% if request.path == '/generator'     %}active{% endif %}">
      <i class="bi bi-lightning-charge"></i> Event Generator
    </a>

    <span class="nav-label">INFO</span>
    <a href="/architecture"  class="nav-link {% if request.path == '/architecture'  %}active{% endif %}">
      <i class="bi bi-diagram-3"></i> Architecture
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="endpoint-badge" id="endpointBadge" title="External endpoint">
      <i class="bi bi-broadcast"></i>
      <span id="endpointHost">localhost:8080</span>
    </div>
  </div>
</aside>

<!-- ── Mobile top bar ───────────────────────────────────────────────────── -->
<div class="topbar d-lg-none">
  <button class="topbar-toggle" id="sidebarToggle">
    <i class="bi bi-list"></i>
  </button>
  <span class="topbar-title">ActivityLog</span>
</div>

<!-- ── Main content ─────────────────────────────────────────────────────── -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
