version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: activitylog_db
    restart: unless-stopped
    environment:
       MYSQL_ROOT_PASSWORD: root
       MYSQL_DATABASE: activity_logs
       MYSQL_USER: appuser
       MYSQL_PASSWORD: root
    ports:
     - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 5
  web:
    image: deamo-app:latest
    container_name: activitylog_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
       DB_HOST: db
       DB_USER: appuser
       DB_PASSWORD: root
       DB_NAME: activity_logs
       EXTERNAL_LOG_ENDPOINT: http://0.0.0.0:8080
    volumes:
      - .:/app
volumes:
  db_data:
